# Render Blueprint — provisions the whole stack from one file.
# Dashboard: New → Blueprint → connect this repo. Render reads this file,
# shows the 4 resources, you confirm, and it builds them.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: chumzy-db
    plan: free # free Postgres is wiped after 30 days — upgrade to a paid plan for real prod
    databaseName: chumzy_rawfoods
    user: chumzy

services:
  # ---- Hono API (Node web service) ----
  - type: web
    name: chumzy-server
    runtime: node
    plan: free # free web services spin down after ~15 min idle (cold start on next hit)
    rootDir: server
    buildCommand: npm ci && npm run build
    # Run migrations then boot. drizzle-kit migrate is idempotent (skips already-
    # applied), so running on each start is safe on free tier. On a paid plan,
    # move "npm run db:migrate" to a preDeployCommand and set startCommand to just
    # "npm run start" so migrations run once per deploy instead of per boot.
    startCommand: npm run db:migrate && npm run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chumzy-db
          property: connectionString # Render's internal URL — no SSL config needed
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random secret
      - key: FRONTEND_URL
        sync: false # set to your storefront URL after first deploy (or custom domain)
      - key: ADMIN_URL
        sync: false # set to your admin URL
      - key: ADMIN_EMAIL
        sync: false # first-admin login (used only by the one-time seed)
      - key: ADMIN_PASSWORD
        sync: false

  # ---- Storefront (Next.js web service) ----
  - type: web
    name: chumzy-web
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      # NEXT_PUBLIC_* is baked in at BUILD time → must be set before the build.
      # Point it at the API's public URL; set after chumzy-server's URL is known.
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # ---- Admin dashboard (Next.js web service) ----
  - type: web
    name: chumzy-admin
    runtime: node
    plan: free
    rootDir: admin
    buildCommand: npm ci && npm run build
    # admin's package.json start hardcodes "-p 3002"; bypass it so Next binds Render's $PORT
    startCommand: npx next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
