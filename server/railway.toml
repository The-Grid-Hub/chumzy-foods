[build]
builder = "NIXPACKS"
# Dependencies install in the Nixpacks install phase (auto-detected from
# package-lock.json). Do not run `npm ci` here — the build phase mounts a cache
# at node_modules/.cache, and `npm ci` wiping node_modules collides with it (EBUSY).
buildCommand = "npm run build"

[deploy]
# Applies pending Drizzle migrations from ./drizzle before the new version
# starts taking traffic. Never edit existing migrations — generate new ones.
preDeployCommand = "npm run db:migrate"
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
